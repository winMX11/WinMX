<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | WinMX Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 4px solid #10b981; color: #10b981; }
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="p-10">

    <div id="admin-login-view" class="min-h-[70vh] flex items-center justify-center">
        <div class="bg-zinc-900 p-8 w-full max-w-sm text-center rounded-[2rem] border border-white/5 shadow-2xl">
            <h2 class="text-3xl font-black mb-2 text-emerald-500 uppercase tracking-tighter italic">WinMX Admin</h2>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest mb-6">Acceso Restringido</p>
            <div class="space-y-4">
                <input id="admin-email" type="email" placeholder="Correo electrónico" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm focus:border-emerald-500 transition-colors">
                <input id="admin-password" type="password" placeholder="Contraseña de Administrador" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm focus:border-emerald-500 transition-colors">
                <button onclick="AdminAuth.login()" class="w-full py-4 bg-emerald-500 text-black font-black rounded-2xl hover:opacity-80 transition-all uppercase tracking-widest text-sm">Ingresar al Panel</button>
            </div>
        </div>
    </div>

    <div id="admin-panel-content" class="hidden-view">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-4xl font-black text-emerald-500 uppercase tracking-tighter italic">
                WinMX Admin <span class="text-white text-sm font-normal">Gestión de Transacciones</span>
            </h1>
            <button onclick="AdminAuth.logout()" class="px-4 py-2 border border-red-500/30 text-red-500 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-red-500/10 transition-all">Cerrar Sesión</button>
        </div>

        <div class="flex gap-8 mb-10 border-b border-white/10">
            <button onclick="changeView('deposits')" id="btn-dep" class="pb-4 font-bold uppercase tracking-widest tab-active">Depósitos</button>
            <button onclick="changeView('withdrawals')" id="btn-with" class="pb-4 font-bold uppercase tracking-widest text-zinc-500">Retiros</button>
            <button onclick="changeView('support')" id="btn-support" class="pb-4 font-bold uppercase tracking-widest text-zinc-500">
    Soporte <span id="support-tab-badge" class="hidden-view bg-red-500 text-white text-[10px] px-2 py-0.5 rounded-full ml-1">0</span>
</button>
        </div>

        <div class="grid grid-cols-1 gap-6" id="pending-list"></div>

<!-- ── PANEL DE SOPORTE ── -->
<div id="support-panel" class="hidden-view" style="display:grid; grid-template-columns:340px 1fr; gap:20px; height:75vh;">
    <!-- Lista de conversaciones -->
    <div style="background:#0d0d0d; border:1px solid rgba(255,255,255,0.06); border-radius:1.5rem; overflow-y:auto;">
        <div style="padding:16px; border-bottom:1px solid rgba(255,255,255,0.06); position:sticky; top:0; background:#0d0d0d; z-index:2;">
            <h3 class="font-black text-emerald-500 uppercase text-sm tracking-wider"><i class="fas fa-comments mr-2"></i>Conversaciones</h3>
        </div>
        <div id="support-conversations-list"></div>
    </div>

    <!-- Ventana de chat activa -->
    <div style="background:#0d0d0d; border:1px solid rgba(255,255,255,0.06); border-radius:1.5rem; display:flex; flex-direction:column; overflow:hidden;">
        <div id="support-chat-empty" style="flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:#444;">
            <div style="font-size:3rem; margin-bottom:10px;">💬</div>
            <p class="font-bold uppercase text-xs">Selecciona una conversación</p>
        </div>
        <div id="support-chat-active" class="hidden-view" style="display:flex; flex-direction:column; height:100%;">
            <div id="support-active-header" style="padding:16px 20px; border-bottom:1px solid rgba(255,255,255,0.06); display:flex; justify-content:between; align-items:center;"></div>
            <div id="support-active-messages" style="flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:10px;"></div>
            <div style="padding:14px 16px; border-top:1px solid rgba(255,255,255,0.06); display:flex; gap:10px;">
                <input id="support-admin-input" type="text" placeholder="Escribe tu respuesta..." onkeydown="if(event.key==='Enter')AdminSupport.send()" class="flex-1 bg-white/5 border border-white/10 rounded-xl px-4 py-3 text-sm text-white outline-none focus:border-emerald-500">
                <button onclick="AdminSupport.send()" class="bg-emerald-500 text-black px-6 py-3 rounded-xl font-black uppercase text-xs hover:opacity-80">Enviar</button>
            </div>
        </div>
    </div>
</div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        let currentType = 'deposits';

        const CORREO_ADMIN_AUTORIZADO = "ed8108868@gmail.com";

        // ════════════════════════════════════════════
// MÓDULO ADMIN: BANDEJA DE SOPORTE
// ════════════════════════════════════════════
const AdminSupport = {
    conversations: {},
    activeUserId: null,
    realtimeStarted: false,

    async loadConversations() {
        const { data, error } = await sb.from('support_messages')
            .select('*')
            .order('created_at', { ascending: true });
        if (error) { console.error(error); return; }

        const grouped = {};
        (data || []).forEach(m => {
            if (!grouped[m.user_id]) grouped[m.user_id] = { messages: [], email: m.user_id };
            grouped[m.user_id].messages.push(m);
        });
        
        // Obtener emails de usuarios
        const userIds = Object.keys(grouped);
        if (userIds.length > 0) {
            const { data: usuarios } = await sb.from('usuarios').select('id, email').in('id', userIds);
            (usuarios || []).forEach(u => {
                if (grouped[u.id]) grouped[u.id].email = u.email || u.id;
            });
        }
        
        this.conversations = grouped;
        this.renderList();
        this.updateGlobalBadge();
        if (!this.realtimeStarted) { this.subscribeRealtime(); this.realtimeStarted = true; }
    },

    renderList() {
        const container = document.getElementById('support-conversations-list');
        if (!container) return;
        const entries = Object.entries(this.conversations).sort((a, b) => {
            const lastA = a[1].messages[a[1].messages.length - 1]?.created_at || '';
            const lastB = b[1].messages[b[1].messages.length - 1]?.created_at || '';
            return new Date(lastB) - new Date(lastA);
        });

        if (entries.length === 0) {
            container.innerHTML = `<p class="text-zinc-600 text-xs text-center p-6">Sin conversaciones aún.</p>`;
            return;
        }

        container.innerHTML = entries.map(([userId, conv]) => {
            const last = conv.messages[conv.messages.length - 1];
            const unread = conv.messages.filter(m => m.sender === 'user' && !m.read_by_admin).length;
            const isActive = this.activeUserId === userId;
            const time = last ? new Date(last.created_at).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' }) : '';
            return `<div onclick="AdminSupport.openConversation('${userId}')" style="padding:14px 16px; border-bottom:1px solid rgba(255,255,255,0.04); cursor:pointer; background:${isActive ? 'rgba(16,185,129,0.08)' : 'transparent'}; border-left:3px solid ${isActive ? '#10b981' : 'transparent'};">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:4px;">
                    <span style="font-size:11px; font-weight:800; color:white; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:180px;">${conv.email}</span>
                    ${unread > 0 ? `<span style="background:#ef4444; color:white; font-size:9px; font-weight:900; padding:2px 7px; border-radius:99px;">${unread}</span>` : ''}
                </div>
                <p style="font-size:10px; color:#777; overflow:hidden; text-overflow:ellipsis; white-space:nowrap;">${last?.sender === 'admin' ? '↳ ' : ''}${last?.message || ''}</p>
                <p style="font-size:8px; color:#444; margin-top:2px;">${time}</p>
            </div>`;
        }).join('');
    },

    async openConversation(userId) {
        this.activeUserId = userId;
        document.getElementById('support-chat-empty').classList.add('hidden-view');
        document.getElementById('support-chat-active').classList.remove('hidden-view');

        const conv = this.conversations[userId];
        document.getElementById('support-active-header').innerHTML = `
            <div>
                <p class="font-black text-white text-sm">${conv.email}</p>
                <p class="text-[9px] text-zinc-500 font-mono">${userId}</p>
            </div>`;

        this.renderMessages();
        this.renderList();

        // Marcar como leídos por admin
        await sb.from('support_messages')
            .update({ read_by_admin: true })
            .eq('user_id', userId)
            .eq('sender', 'user')
            .eq('read_by_admin', false);
        conv.messages.forEach(m => { if (m.sender === 'user') m.read_by_admin = true; });
        this.renderList();
        this.updateGlobalBadge();
    },

    renderMessages() {
        const box = document.getElementById('support-active-messages');
        if (!box || !this.activeUserId) return;
        const conv = this.conversations[this.activeUserId];
        box.innerHTML = conv.messages.map(m => {
            const isAdmin = m.sender === 'admin';
            const time = new Date(m.created_at).toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
            return `<div style="display:flex; justify-content:${isAdmin ? 'flex-end' : 'flex-start'};">
                <div style="max-width:65%; background:${isAdmin ? 'linear-gradient(135deg,#10b981,#059669)' : 'rgba(255,255,255,0.06)'}; color:${isAdmin ? 'black' : 'white'}; padding:10px 14px; border-radius:${isAdmin ? '14px 14px 2px 14px' : '14px 14px 14px 2px'}; font-size:12px; font-weight:600;">
                    ${m.message}
                    <div style="font-size:8px; opacity:0.6; margin-top:3px; text-align:right;">${time}</div>
                </div>
            </div>`;
        }).join('');
        box.scrollTop = box.scrollHeight;
    },

    async send() {
        const input = document.getElementById('support-admin-input');
        const text = input.value.trim();
        if (!text || !this.activeUserId) return;
        input.value = '';
        const { error } = await sb.from('support_messages').insert([{
            user_id: this.activeUserId,
            sender: 'admin',
            message: text
        }]);
        if (error) { 
            alert("Error al enviar: " + error.message); 
        } else {
            // Recargar mensajes inmediatamente
            const userId = this.activeUserId;
            await new Promise(r => setTimeout(r, 300));
            await this.loadConversations();
            this.openConversation(userId);
        }
    },

    updateGlobalBadge() {
        let totalUnread = 0;
        Object.values(this.conversations).forEach(c => {
            totalUnread += c.messages.filter(m => m.sender === 'user' && !m.read_by_admin).length;
        });
        const badge = document.getElementById('support-tab-badge');
        if (badge) {
            if (totalUnread > 0) { badge.innerText = totalUnread; badge.classList.remove('hidden-view'); }
            else badge.classList.add('hidden-view');
        }
    },

    subscribeRealtime() {
        sb.channel('admin_support_live')
            .on('postgres_changes', {
                event: '*',
                schema: 'public',
                table: 'support_messages'
            }, async (payload) => {
                console.log('🔔 Cambio en support_messages:', payload);
                await this.loadConversations();
                if (this.activeUserId) {
                    this.openConversation(this.activeUserId);
                }
            })
            .subscribe();
    }
};

        const AdminAuth = {
            async login() {
                const email = document.getElementById('admin-email').value.trim().toLowerCase();
                const password = document.getElementById('admin-password').value;
                if (!email || !password) { alert("Completa todos los campos."); return; }
                if (email !== CORREO_ADMIN_AUTORIZADO.toLowerCase()) { alert("Acceso denegado."); return; }
                const { data, error } = await sb.auth.signInWithPassword({ email, password });
                if (error) { alert("Contraseña incorrecta: " + error.message); }
                else { this.showPanel(); }
            },
            
            async checkSession() {
                const { data: { session } } = await sb.auth.getSession();
                if (session && session.user.email.toLowerCase() === CORREO_ADMIN_AUTORIZADO.toLowerCase()) {
                    this.showPanel();
                } else if (session) { await sb.auth.signOut(); }
            },
            showPanel() {
                document.getElementById('admin-login-view').classList.add('hidden-view');
                document.getElementById('admin-panel-content').classList.remove('hidden-view');
                loadPending();
            },
            async logout() { await sb.auth.signOut(); location.reload(); }
        };

        function changeView(type) {
    currentType = type;
    document.getElementById('btn-dep').classList.toggle('tab-active', type === 'deposits');
    document.getElementById('btn-dep').classList.toggle('text-zinc-500', type !== 'deposits');
    document.getElementById('btn-with').classList.toggle('tab-active', type === 'withdrawals');
    document.getElementById('btn-with').classList.toggle('text-zinc-500', type !== 'withdrawals');
    document.getElementById('btn-support').classList.toggle('tab-active', type === 'support');
    document.getElementById('btn-support').classList.toggle('text-zinc-500', type !== 'support');

    document.getElementById('pending-list').classList.toggle('hidden-view', type === 'support');
    document.getElementById('support-panel').classList.toggle('hidden-view', type !== 'support');

    if (type === 'support') { AdminSupport.loadConversations(); }
    else { loadPending(); }
}

        async function loadPending() {
            const isDeposit = currentType === 'deposits';
            let query = sb.from('history').select('*, usuarios(saldo)').eq('status', 'pending');
            if (isDeposit) {
                query = query.eq('type', 'deposits');
            } else {
                query = query.in('type', ['withdrawals', 'bets']).eq('label', 'RETIRO PENDIENTE');
            }
            const { data, error } = await query.order('created_at', { ascending: false });
            const container = document.getElementById('pending-list');
            if (error) return console.error(error);

            container.innerHTML = (!data || data.length === 0) ?
                `<p class="text-zinc-600">No hay ${isDeposit ? 'depósitos' : 'retiros'} pendientes.</p>` : '';

            data.forEach(item => {
                const currentSaldo = item.usuarios ? item.usuarios.saldo : 0;
                let bancoDisplay = item.bank_name || 'No especificado';
                let titularDisplay = item.account_holder || 'No especificado';
                let clabeDisplay = 'No especificado';
                if (!isDeposit && item.account_holder && item.account_holder.includes('| CLABE:')) {
                    const partes = item.account_holder.split('| CLABE:');
                    titularDisplay = partes[0].trim();
                    clabeDisplay = partes[1].trim();
                }

                container.innerHTML += `
                    <div class="bg-zinc-900 p-6 rounded-[2rem] border border-white/5 flex items-center justify-between">
                        <div class="flex gap-6 items-center">
                            <div class="w-32 h-32 bg-zinc-800 rounded-2xl flex items-center justify-center overflow-hidden border border-white/10">
                                ${isDeposit && item.evidence_url ?
                                    `<img src="${item.evidence_url}" class="w-full h-full object-cover cursor-pointer" onclick="window.open('${item.evidence_url}')">` :
                                    `<div class="text-center"><p class="text-[10px] text-zinc-500 uppercase">Solicitud de</p><p class="font-black text-red-500">RETIRO</p></div>`}
                            </div>
                            <div>
                                <p class="${isDeposit ? 'text-emerald-500' : 'text-red-500'} font-bold text-2xl tracking-tighter">
                                    ${isDeposit ? '+' : '-'}$${Math.abs(item.amount)}
                                </p>
                                <div class="mt-2 space-y-1">
                                    <p class="text-[10px] text-zinc-500 font-mono">USUARIO ID: ${item.user_id}</p>
                                    <p class="text-[11px] text-white font-bold bg-white/5 px-2 py-1 rounded w-fit">BANCO: ${bancoDisplay}</p>
                                    <p class="text-[11px] text-zinc-300 italic">TITULAR: ${titularDisplay}</p>
                                    ${!isDeposit ? `<p class="text-[11px] text-yellow-500 font-mono bg-yellow-500/10 px-2 py-0.5 rounded w-fit font-bold">CLABE: ${clabeDisplay}</p>` : ''}
                                    <p class="text-[10px] text-zinc-400 uppercase">SALDO ACTUAL: $${currentSaldo}</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="approveTransaction('${item.id}', '${item.user_id}', ${Math.abs(item.amount)}, ${currentSaldo})"
                                class="${isDeposit ? 'bg-emerald-500' : 'bg-red-500'} text-black px-8 py-4 rounded-2xl font-black hover:opacity-80 transition-all uppercase text-sm">
                                ${isDeposit ? 'Aprobar Carga' : 'Confirmar Envío'}
                            </button>
                            <button onclick="rejectTransaction('${item.id}', '${item.user_id}', ${Math.abs(item.amount)}, ${currentSaldo})"
                                class="bg-zinc-800 text-zinc-400 px-8 py-4 rounded-2xl font-black border border-white/5 hover:bg-white/10 hover:text-white transition-all text-sm">
                                RECHAZAR
                            </button>
                        </div>
                    </div>`;
            });
        }

        async function esPrimerDeposito(userId) {
            const { data: userData, error: userErr } = await sb
                .from('usuarios')
                .select('has_used_first_deposit_bonus')
                .eq('id', userId)
                .maybeSingle();

            if (!userErr && userData) {
                if (userData.has_used_first_deposit_bonus === true) return false;
            }

            const { data, error } = await sb
                .from('history')
                .select('id')
                .eq('user_id', userId)
                .eq('type', 'deposits')
                .eq('status', 'completed')
                .limit(1);
            if (error) return false;
            return !data || data.length === 0;
        }

        async function activarBonoMundial(userId, montoDeposito) {
            const { data: existente } = await sb
                .from('bonus_depositos')
                .select('id')
                .eq('user_id', userId)
                .maybeSingle();
            if (existente) return;

            const { error } = await sb.from('bonus_depositos').insert([{
                user_id: userId,
                amount: montoDeposito,
                status: 'active'
            }]);
            if (error) {
                console.error('Error creando bono:', error);
                return;
            }

            await sb.from('usuarios')
                .update({ has_used_first_deposit_bonus: true })
                .eq('id', userId);

            console.log(`✅ Bono de $${montoDeposito} MXN activado para usuario ${userId}`);
        }

        async function approveTransaction(historyId, userId, amount, currentSaldo) {
            const isDeposit = currentType === 'deposits';
            if (!confirm(`¿Deseas ${isDeposit ? "aprobar este depósito" : "confirmar que ya enviaste el retiro"}?`)) return;

            let esPrimero = false;
            if (isDeposit) {
                esPrimero = await esPrimerDeposito(userId);
            }

            const newSaldo = isDeposit ? (currentSaldo + amount) : currentSaldo;

            const { error: errSaldo } = await sb.from('usuarios').update({ saldo: newSaldo }).eq('id', userId);
            const { error: errHist } = await sb.from('history').update({
                status: 'completed',
                label: isDeposit ? 'DEPÓSITO APROBADO' : 'RETIRO ENVIADO CORECTAMENTE'
            }).eq('id', historyId);

            if (!errSaldo && !errHist) {
                if (isDeposit && esPrimero) {
                    await activarBonoMundial(userId, amount);
                    alert(`✅ Depósito aprobado.\n🎁 Bono de $${amount} MXN activado automáticamente para el usuario.`);
                } else {
                    alert("Transacción finalizada con éxito.");
                }
                loadPending();
            } else {
                alert("Hubo un error. Revisa la consola.");
                console.error(errSaldo, errHist);
            }
        }

        async function rejectTransaction(historyId, userId, amount, currentSaldo) {
            const isDeposit = currentType === 'deposits';
            if (!confirm("¿Rechazar esta solicitud?")) return;
            if (!isDeposit) {
                await sb.from('usuarios').update({ saldo: currentSaldo + amount }).eq('id', userId);
            }
            const label = isDeposit ? 'DEPÓSITO RECHAZADO' : 'RETIRO RECHAZADO';
            await sb.from('history').update({ status: 'rejected', label }).eq('id', historyId);
            loadPending();
        }

        AdminAuth.checkSession();
        setInterval(() => {
            const viewLogin = document.getElementById('admin-login-view');
            if (viewLogin && viewLogin.classList.contains('hidden-view')) loadPending();
        }, 5000);
    </script>
</body>
</html>
