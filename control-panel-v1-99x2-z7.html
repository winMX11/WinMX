<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel de Control | WinMX Admin</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { background: #050505; color: white; font-family: 'Inter', sans-serif; }
        .tab-active { border-bottom: 4px solid #10b981; color: #10b981; }
        .hidden-view { display: none !important; }
    </style>
</head>
<body class="p-10">

    <div id="admin-login-view" class="min-h-[70vh] flex items-center justify-center">
        <div class="bg-zinc-900 p-8 w-full max-w-sm text-center rounded-[2rem] border border-white/5 shadow-2xl">
            <h2 class="text-3xl font-black mb-2 text-emerald-500 uppercase tracking-tighter italic">WinMX Admin</h2>
            <p class="text-zinc-500 text-[10px] font-bold uppercase tracking-widest mb-6">Acceso Restringido</p>
            <div class="space-y-4">
                <input id="admin-email" type="email" placeholder="Correo electrónico" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm focus:border-emerald-500 transition-colors">
                <input id="admin-password" type="password" placeholder="Contraseña de Administrador" class="w-full bg-white/5 border border-white/10 p-4 rounded-2xl outline-none text-white text-sm focus:border-emerald-500 transition-colors">
                <button onclick="AdminAuth.login()" class="w-full py-4 bg-emerald-500 text-black font-black rounded-2xl hover:opacity-80 transition-all uppercase tracking-widest text-sm">Ingresar al Panel</button>
            </div>
        </div>
    </div>

    <div id="admin-panel-content" class="hidden-view">
        <div class="flex justify-between items-center mb-6">
            <h1 class="text-4xl font-black text-emerald-500 uppercase tracking-tighter italic">
                WinMX Admin <span class="text-white text-sm font-normal">Gestión de Transacciones</span>
            </h1>
            <button onclick="AdminAuth.logout()" class="px-4 py-2 border border-red-500/30 text-red-500 rounded-xl text-xs font-bold uppercase tracking-wider hover:bg-red-500/10 transition-all">Cerrar Sesión</button>
        </div>

        <div class="flex gap-8 mb-10 border-b border-white/10">
            <button onclick="changeView('deposits')" id="btn-dep" class="pb-4 font-bold uppercase tracking-widest tab-active">Depósitos</button>
            <button onclick="changeView('withdrawals')" id="btn-with" class="pb-4 font-bold uppercase tracking-widest text-zinc-500">Retiros</button>
        </div>

        <div class="grid grid-cols-1 gap-6" id="pending-list"></div>
    </div>

    <script>
        const sb = window.supabase.createClient("https://dakhnqriwbzihlzhtfcb.supabase.co", "sb_publishable_rRcNEvZ9n0IEJzTQcK90nQ_5lfwSDYs");
        let currentType = 'deposits';

        // CONFIGURACIÓN DE SEGURIDAD EXCLUSIVA (Pon aquí tu mismo correo que en casino5.html)
        const CORREO_ADMIN_AUTORIZADO = "ed8108868@gmail.com"; 

        const AdminAuth = {
            async login() {
                const email = document.getElementById('admin-email').value.trim().toLowerCase();
                const password = document.getElementById('admin-password').value;

                if (!email || !password) {
                    alert("Completa todos los campos, por favor.");
                    return;
                }

                if (email !== CORREO_ADMIN_AUTORIZADO.toLowerCase()) {
                    alert("Acceso denegado: Este correo electrónico no tiene permisos de administrador.");
                    return;
                }

                const { data, error } = await sb.auth.signInWithPassword({ email: email, password: password });

                if (error) {
                    alert("Contraseña incorrecta: " + error.message);
                } else {
                    this.showPanel();
                }
            },
            async checkSession() {
                const { data: { session } } = await sb.auth.getSession();
                if (session && session.user.email.toLowerCase() === CORREO_ADMIN_AUTORIZADO.toLowerCase()) {
                    this.showPanel();
                } else if (session) {
                    await sb.auth.signOut();
                }
            },
            showPanel() {
                document.getElementById('admin-login-view').classList.add('hidden-view');
                document.getElementById('admin-panel-content').classList.remove('hidden-view');
                loadPending();
            },
            async logout() {
                await sb.auth.signOut();
                location.reload();
            }
        };

        function changeView(type) {
            currentType = type;
            document.getElementById('btn-dep').classList.toggle('tab-active', type === 'deposits');
            document.getElementById('btn-dep').classList.toggle('text-zinc-500', type !== 'deposits');
            document.getElementById('btn-with').classList.toggle('tab-active', type === 'withdrawals');
            document.getElementById('btn-with').classList.toggle('text-zinc-500', type !== 'withdrawals');
            loadPending();
        }

        async function loadPending() {
            const isDeposit = currentType === 'deposits';
            let query = sb.from('history').select('*, usuarios(saldo)').eq('status', 'pending');

            if (isDeposit) {
                query = query.eq('type', 'deposits');
            } else {
                query = query.in('type', ['withdrawals', 'bets']).eq('label', 'RETIRO PENDIENTE');
            }

            const { data, error } = await query.order('created_at', { ascending: false });
            const container = document.getElementById('pending-list');
            if(error) return console.error(error);
            
            container.innerHTML = (!data || data.length === 0) ? 
                `<p class="text-zinc-600">No hay ${isDeposit ? 'depósitos' : 'retiros'} pendientes.</p>` : '';

            data.forEach(item => {
                const currentSaldo = item.usuarios ? item.usuarios.saldo : 0;
                
                // Procesamiento inteligente de textos para la sección de retiros
                let bancoDisplay = item.bank_name || 'No especificado';
                let titularDisplay = 'No especificado';
                let clabeDisplay = 'No especificado';

                if (!isDeposit && item.account_holder) {
                    // Separar el titular y la cuenta CLABE guardados bajo el formato del casino
                    if (item.account_holder.includes('| CLABE:')) {
                        const partes = item.account_holder.split('| CLABE:');
                        titularDisplay = partes[0].trim();
                        clabeDisplay = partes[1].trim();
                    } else {
                        titularDisplay = item.account_holder;
                    }
                } else if (isDeposit) {
                    titularDisplay = item.account_holder || 'No especificado';
                }

                container.innerHTML += `
                    <div class="bg-zinc-900 p-6 rounded-[2rem] border border-white/5 flex items-center justify-between">
                        <div class="flex gap-6 items-center">
                            <div class="w-32 h-32 bg-zinc-800 rounded-2xl flex items-center justify-center overflow-hidden border border-white/10">
                                ${isDeposit && item.evidence_url ? 
                                    `<img src="${item.evidence_url}" class="w-full h-full object-cover cursor-pointer" onclick="window.open('${item.evidence_url}')">` : 
                                    `<div class="text-center"><p class="text-[10px] text-zinc-500 uppercase">Solicitud de</p><p class="font-black text-red-500">RETIRO</p></div>`}
                            </div>
                            <div>
                                <p class="${isDeposit ? 'text-emerald-500' : 'text-red-500'} font-bold text-2xl tracking-tighter">
                                    ${isDeposit ? '+' : '-'}$${Math.abs(item.amount)}
                                </p>
                                <div class="mt-2 space-y-1">
                                    <p class="text-[10px] text-zinc-500 font-mono">USUARIO ID: ${item.user_id}</p>
                                    <p class="text-[11px] text-white font-bold bg-white/5 px-2 py-1 rounded w-fit">BANCO: ${bancoDisplay}</p>
                                    <p class="text-[11px] text-zinc-300 italic">TITULAR: ${titularDisplay}</p>
                                    ${!isDeposit ? `<p class="text-[11px] text-yellow-500 font-mono bg-yellow-500/10 px-2 py-0.5 rounded w-fit">CLABE: ${clabeDisplay}</p>` : ''}
                                    <p class="text-[10px] text-zinc-400 uppercase">SALDO ACTUAL DEL JUGADOR: $${currentSaldo}</p>
                                </div>
                            </div>
                        </div>
                        <div class="flex gap-4">
                            <button onclick="approveTransaction('${item.id}', '${item.user_id}', ${Math.abs(item.amount)}, ${currentSaldo})" 
                                class="${isDeposit ? 'bg-emerald-500' : 'bg-red-500'} text-black px-8 py-4 rounded-2xl font-black hover:opacity-80 transition-all uppercase text-sm">
                                ${isDeposit ? 'Aprobar Carga' : 'Confirmar Envío'}
                            </button>
                            <button onclick="rejectTransaction('${item.id}', '${item.user_id}', ${Math.abs(item.amount)}, ${currentSaldo})" 
                                class="bg-zinc-800 text-zinc-400 px-8 py-4 rounded-2xl font-black border border-white/5 hover:bg-white/10 hover:text-white transition-all text-sm">
                                RECHAZAR
                            </button>
                        </div>
                    </div>`;
            });
        }

        async function approveTransaction(historyId, userId, amount, currentSaldo) {
            const isDeposit = currentType === 'deposits';
            if(!confirm(`¿Deseas ${isDeposit ? "aprobar este depósito" : "confirmar que ya enviaste el retiro"}?`)) return;

            const newSaldo = isDeposit ? (currentSaldo + amount) : currentSaldo;

            const { error: errSaldo } = await sb.from('usuarios').update({ saldo: newSaldo }).eq('id', userId);
            const { error: errHist } = await sb.from('history').update({ 
                status: 'completed', 
                label: isDeposit ? 'DEPÓSITO APROBADO' : 'RETIRO ENVIADO CORECTAMENTE' 
            }).eq('id', historyId);

            if(!errSaldo && !errHist) {
                alert("Transacción finalizada con éxito.");
                loadPending();
            } else {
                alert("Hubo un error. Revisa la consola.");
                console.error(errSaldo, errHist);
            }
        }

        async function rejectTransaction(historyId, userId, amount, currentSaldo) {
            const isDeposit = currentType === 'deposits';
            if(!confirm("¿Rechazar esta solicitud?")) return;
            
            if (!isDeposit) {
                const restoredSaldo = currentSaldo + amount;
                await sb.from('usuarios').update({ saldo: restoredSaldo }).eq('id', userId);
            }

            const label = isDeposit ? 'DEPÓSITO RECHAZADO' : 'RETIRO RECHAZADO';
            await sb.from('history').update({ status: 'rejected', label: label }).eq('id', historyId);
            loadPending();
        }

        AdminAuth.checkSession();
        setInterval(() => {
            const viewLogin = document.getElementById('admin-login-view');
            if (viewLogin && viewLogin.classList.contains('hidden-view')) {
                loadPending();
            }
        }, 5000);
    </script>
</body>
</html>
